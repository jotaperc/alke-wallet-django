{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Alke Wallet - Dashboard</title>
</head>
<body class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold">Alke Wallet</h2>
            <a href="{% url 'crear_usuario' %}" class="btn btn-primary">+ Nuevo Usuario</a>
        </div>

        <div class="card p-4">
            <h4 class="mb-3">Usuarios Registrados</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Saldo Actual</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in usuarios %}
                        <tr>
                            <td>{{ u.nombre }}</td>
                            <td>{{ u.correo }}</td>
                            <td class="fw-bold text-success">$ {{ u.saldo }}</td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="3" class="text-center">No hay usuarios registrados.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
