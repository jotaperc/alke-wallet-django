{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Alke Wallet - Registro</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container card p-4 shadow-sm" style="max-width: 500px;">
        <h2 class="text-center text-primary mb-4">Registro de Usuario</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-secondary">Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="nombre@correo.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Guardar en Base de Datos</button>
            <a href="{% url 'lista_usuarios' %}" class="btn btn-outline-secondary btn-sm w-100">Cancelar y Volver</a>
        </form>
    </div>
</body>
</html>
